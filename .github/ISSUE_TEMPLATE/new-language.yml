name: New language
description: Propose adding a new translation language
labels: ["enhancement", "language"]
body:
  - type: input
    id: language
    attributes:
      label: Language name
      placeholder: e.g. French
    validations:
      required: true
  - type: input
    id: iso-code
    attributes:
      label: ISO 639-1 code
      description: Two-letter code used as the key in config
      placeholder: e.g. fr
    validations:
      required: true
  - type: input
    id: emoji
    attributes:
      label: Flag emoji
      placeholder: e.g. 🇫🇷
    validations:
      required: true
  - type: dropdown
    id: gender
    attributes:
      label: Has grammatical gender?
      options:
        - "Yes"
        - "No"
    validations:
      required: true
  - type: textarea
    id: samples
    attributes:
      label: Sample translations
      description: Translate a few existing words so we can verify the setup works.
      placeholder: |
        - serendipity → sérendipité
        - wanderlust → bougeotte
    validations:
      required: false
  - type: textarea
    id: notes
    attributes:
      label: Additional notes
      description: Anything else relevant (e.g. transliteration needed, special characters).
    validations:
      required: false
